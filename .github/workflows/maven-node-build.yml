name: Build all

on:
  pull_request:
  push:
    branches:
      - "main"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      TZ: Europe/Berlin # timezone
    strategy:
      fail-fast: false
      matrix:
        include: # hier müssen die Pfade angegeben werden
          - app-path: lehrer-datenhub-backend
          - app-path: lehrer-datenhub-frontend

    steps:
      - uses: it-at-m/lhm_actions/action-templates/actions/action-checkout@1a673d9c3be4a4f59cf29f425bc2b00fc42751fd # v1.0.32
      - if: ${{ hashFiles(format('./{0}/package.json', matrix.app-path))!=null }}
        id: node
        uses: it-at-m/lhm_actions/action-templates/actions/action-npm-build@1a673d9c3be4a4f59cf29f425bc2b00fc42751fd # v1.0.32
        with:
          app-path: ${{ matrix.app-path }}
      - if: ${{ hashFiles(format('./{0}/pom.xml', matrix.app-path))!=null }}
        id: maven
        uses: it-at-m/lhm_actions/action-templates/actions/action-maven-build@1a673d9c3be4a4f59cf29f425bc2b00fc42751fd # v1.0.32
        with:
          app-path: ${{ matrix.app-path }}
      - if: github.ref == 'refs/heads/main'
        uses: it-at-m/lhm_actions/action-templates/actions/action-build-image@1a673d9c3be4a4f59cf29f425bc2b00fc42751fd # v1.0.32
        with:
          path: ${{ matrix.app-path }}
          image-name: ${{ matrix.app-path }}
          artifact-name: ${{ join(steps.*.outputs.artifact-name) }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}
          registry-username: ${{ github.actor }}
          image-tags: |
            type=raw,value=dev
